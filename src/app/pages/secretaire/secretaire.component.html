<!-- src/app/pages/secretaire/secretaire-dashboard.component.html -->
<div class="secretaire-container">
  <!-- Header -->
  <header class="secretaire-header">
    <div class="header-left">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L12 22M2 12L22 12" stroke="#0e7268" stroke-width="3" stroke-linecap="round"/>
          <circle cx="12" cy="12" r="10" stroke="#0e7268" stroke-width="2"/>
        </svg>
        <div class="header-text">
          <h1>SmartCare</h1>
          <p class="header-subtitle">Espace Secrétaire</p>
        </div>
      </div>
    </div>
    <div class="header-right">
      <div class="user-info">
        <div class="user-avatar">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2"/>
            <path d="M20 21V19C20 17.9391 19.5786 16.9217 18.8284 16.1716C18.0783 15.4214 17.0609 15 16 15H8C6.93913 15 5.92172 15.4214 5.17157 16.1716C4.42143 16.9217 4 17.9391 4 19V21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="user-details">
          <span class="user-name">Secrétaire</span>
          <button class="logout-btn" (click)="logout()">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M9 21H5C4.46957 21 3.96086 20.7893 3.58579 20.4142C3.21071 20.0391 3 19.5304 3 19V5C3 4.46957 3.21071 3.96086 3.58579 3.58579C3.96086 3.21071 4.46957 3 5 3H9M16 17L21 12M21 12L16 7M21 12H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Déconnexion
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="secretaire-main">
    <div class="dashboard-header">
      <div class="welcome-section">
        <h2>Bienvenue, <span class="highlight">Secrétaire</span> </h2>
        <p>Gérez les patients, rendez-vous et la file d'attente de manière efficace</p>
      </div>
    </div>

    <!-- Tabs Navigation -->
    <div class="tabs-container">
      <div class="tabs">
        <button 
          class="tab-btn" 
          (click)="activeTab = 'patients'" 
          [class.active]="activeTab === 'patients'"
        >
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2"/>
            <path d="M20 21V19C20 17.9391 19.5786 16.9217 18.8284 16.1716C18.0783 15.4214 17.0609 15 16 15H8C6.93913 15 5.92172 15.4214 5.17157 16.1716C4.42143 16.9217 4 17.9391 4 19V21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Patients
        </button>
        <button 
          class="tab-btn" 
          (click)="activeTab = 'rdv'" 
          [class.active]="activeTab === 'rdv'"
        >
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/>
            <path d="M8 2V6M16 2V6M3 10H21M8 14H8.01M12 14H12.01M16 14H16.01M8 18H8.01M12 18H12.01M16 18H16.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Rendez-vous
        </button>
        <button 
          class="tab-btn" 
          (click)="activeTab = 'queue'" 
          [class.active]="activeTab === 'queue'"
        >
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L12 22M2 12L22 12" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
            <path d="M8 12H16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          File d'attente
        </button>
      </div>
    </div>

    <!-- Tab Content -->
    <div class="tab-content">
      <div class="content-wrapper">
        <app-patient-list *ngIf="activeTab === 'patients'"></app-patient-list>
        <app-rdv-list *ngIf="activeTab === 'rdv'"></app-rdv-list>
        <app-waiting-queue *ngIf="activeTab === 'queue'"></app-waiting-queue>
      </div>
    </div>
  </main>

  
</div>
